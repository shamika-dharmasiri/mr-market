name: Fetch Market Data

on:
  schedule:
    # Every 4 hours on weekdays (Mon–Fri), covering AEST trading hours
    # UTC times below = 6am/10am/2pm/6pm/10pm AEST (UTC+10)
    - cron: '0 20,0,4,8,12 * * 0-4'
  workflow_dispatch:  # Allow manual run from GitHub UI

permissions:
  contents: write

jobs:
  fetch-market-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch market data
        run: node scripts/fetch-market-data.mjs

      - name: Commit and push data/market.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market.json data/market-data.js
          # Only commit if there are actual changes
          git diff --staged --quiet || \
            git commit -m "chore: update market data $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
